# SonarCloud configuration for pi-claude-marketplace.
sonar.projectKey=acolomba_pi-claude-marketplace
sonar.organization=acolomba

# Project metadata.
sonar.projectName=Pi Claude Marketplace
sonar.projectVersion=0.5.0

# Source code settings.
sonar.sources=extensions/pi-claude-marketplace
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Coverage settings.
sonar.javascript.lcov.reportPaths=coverage/unit.lcov,coverage/integration.lcov,coverage/e2e.lcov

# Exclusions.
sonar.exclusions=.claude/**,.opencode/**,.pi/**,.planning/**,build/**,coverage/**,dist/**,node_modules/**
sonar.test.exclusions=tests/**

# Copy-paste detection exclusions.
# The agents and commands bridges' commitPrepared* helpers share a deliberately
# structurally-identical rollback shape (completedRenames[] + reverse-walk +
# appendLeaks, TR-01 / TR-05). Phase 38 RESEARCH Open Q1 rejected extracting
# this into a shared helper -- locality at the bridge level keeps the rollback
# contract visible alongside the commit it protects, and the deferred skills
# bridge would have been a non-adopter (premature abstraction).
sonar.cpd.exclusions=extensions/pi-claude-marketplace/bridges/agents/stage.ts,extensions/pi-claude-marketplace/bridges/commands/stage.ts
